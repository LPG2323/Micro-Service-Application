<div class="d-flex flex-column flex-md-row justify-content-between align-items-center mt-3 gap-2">
	<div class="d-flex align-items-center gap-2">
		<label for="itemsPerPageSelect" class="form-label mb-0 small text-secondary">
			Afficher :
		</label>
		<select id="itemsPerPageSelect" class="form-select form-select-sm" style="width: 80px" [ngModel]="itemsPerPage"
			(ngModelChange)="changeItemsPerPage($event)">
			<option *ngFor="let option of perPageOptions" [value]="option">{{ option }}</option>
		</select>
		<span class="small text-muted">par page</span>
	</div>

	<div>
		<p class="mb-0 small text-muted">
			{{ totalItems }} éléments au total
		</p>
	</div>

	<nav aria-label="Page navigation">
		<ul class="pagination mb-0">
			<li class="page-item" [class.disabled]="currentPage === 1">
				<button class="page-link" (click)="changePage(currentPage - 1)" aria-label="Précédent">
					&lt;
				</button>
			</li>

			<li *ngFor="let page of pages" class="page-item" [class.active]="page === currentPage">
				<button class="page-link" (click)="changePage(page)">
					{{ page }}
				</button>
			</li>

			<li class="page-item" [class.disabled]="currentPage === totalPages">
				<button class="page-link" (click)="changePage(currentPage + 1)" aria-label="Suivant">
					&gt;
				</button>
			</li>
		</ul>
	</nav>
</div>
