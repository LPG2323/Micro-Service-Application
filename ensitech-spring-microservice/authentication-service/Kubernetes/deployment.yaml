apiVersion: apps/v1

kind: Deployment

metadata:

  name: authentication-service

spec:

  replicas: 1

  selector:

    matchLabels:

      app: authentication-service

  template:

    metadata:

      labels:

        app: authentication-service

    spec:

      containers:

        - name: authentication-service

          image: maitrelpg/authentication-service:latest

          ports:

            - containerPort: 8083