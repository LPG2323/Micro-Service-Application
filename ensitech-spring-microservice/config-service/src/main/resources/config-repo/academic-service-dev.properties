spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=never
#spring.config.import=optional:file:.env[.properties]

#spring.sql.init.platform=h2


spring.datasource.url=${MYSQL_ACY_DB}
