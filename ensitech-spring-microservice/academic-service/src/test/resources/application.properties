#Configuration minimale pour l'environnement de test

#On fournit une valeur pour la propriÃĐtÃĐ manquante.
error.default-message=Message de test
# Désactive l'exécution des fichiers schema.sql et data.sql pendant les tests
spring.sql.init.mode=never

# S'assure qu'Hibernate crée bien les tables pour la base H2 des tests
spring.jpa.hibernate.ddl-auto=create-drop

#On dÃĐsactive explicitement le client Config et le client Eureka pour les tests,
#car ces services ne sont pas disponibles.
spring.cloud.config.enabled=false
spring.cloud.discovery.enabled=false
eureka.client.enabled=false


